<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: white;
    }
    #score { font-size: 24px; margin-bottom: 16px; }
    canvas {
      border: 2px solid #444;
      display: block;
    }
    #message {
      margin-top: 16px;
      font-size: 16px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Pulsa una tecla de dirección para empezar</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    const GRID = 20;
    const CELL = canvas.width / GRID;

    let snake, dir, next, food, score, loop, started;

    function init() {
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      dir = {x: 1, y: 0};
      next = {x: 1, y: 0};
      score = 0;
      started = false;
      scoreEl.textContent = 'Score: 0';
      messageEl.textContent = 'Pulsa una tecla de dirección para empezar';
      placeFood();
      clearInterval(loop);
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function start() {
      started = true;
      messageEl.textContent = '';
      loop = setInterval(tick, 150);
    }

    function tick() {
      dir = next;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if (
        head.x < 0 || head.x >= GRID ||
        head.y < 0 || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)
      ) {
        clearInterval(loop);
        messageEl.textContent = `Game Over — Score: ${score}. Pulsa una tecla para reiniciar`;
        started = false;
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = `Score: ${score}`;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00cc44';
      snake.forEach((s, i) => {
        ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
      });

      ctx.fillStyle = '#ff4444';
      ctx.fillRect(food.x * CELL + 1, food.y * CELL + 1, CELL - 2, CELL - 2);
    }

    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp:    {x: 0,  y: -1},
        ArrowDown:  {x: 0,  y: 1},
        ArrowLeft:  {x: -1, y: 0},
        ArrowRight: {x: 1,  y: 0}
      };
      const d = keys[e.key];
      if (!d) return;
      if (d.x === -dir.x && d.y === -dir.y) return;
      next = d;
      if (!started) start();
      else if (!loop) init();
    });

    init();
  </script>
</body>
</html>
