<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: white;
      touch-action: none;
      user-select: none;
    }
    #score { font-size: 24px; margin-bottom: 16px; }
    canvas { border: 2px solid #444; display: block; }
    #message {
      margin-top: 16px;
      font-size: 16px;
      color: #aaa;
      text-align: center;
      padding: 0 16px;
      min-height: 24px;
    }
    #buttons { display: flex; gap: 12px; margin-top: 14px; }
    .btn {
      padding: 10px 24px;
      font-family: monospace;
      font-size: 16px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #btn-normal { background: #00cc44; color: #1a1a1a; }
    #btn-normal:hover { background: #00ff55; }
    #btn-bombs  { background: #ff6600; color: #1a1a1a; }
    #btn-bombs:hover  { background: #ff8800; }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message"></div>
  <div id="buttons">
    <button id="btn-normal" class="btn">EMPEZAR</button>
    <button id="btn-bombs"  class="btn">💣 BOMBAS</button>
  </div>

  <script>
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const scoreEl   = document.getElementById('score');
    const msgEl     = document.getElementById('message');
    const btnNormal = document.getElementById('btn-normal');
    const btnBombs  = document.getElementById('btn-bombs');

    const GRID    = 20;
    const CELL    = canvas.width / GRID;
    const TICK_MS = 150;

    // ── BOMB MODE CONFIG (fácil de ajustar) ─────────────
    const STEPS_PER_SPAWN     = 20; // pasos entre aparición de cada número
    const STEPS_PER_DECREMENT = 3;  // pasos para que el número baje 1
    const MAX_RAY_LENGTH      = 5;  // longitud máxima de rayo antes de que la bomba desaparezca
    // ─────────────────────────────────────────────────────

    const RAY_DIRS = [
      {dx:1,dy:0},{dx:-1,dy:0},
      {dx:0,dy:1},{dx:0,dy:-1},
      {dx:1,dy:1},{dx:-1,dy:-1},
      {dx:1,dy:-1},{dx:-1,dy:1}
    ];

    let snake, dir, next, food, score, loop, started;
    let bombMode, totalSteps, hazards;
    let touchStartX, touchStartY;

    // ── INIT ──────────────────────────────────────────────
    function init(withBombs) {
      bombMode   = withBombs;
      snake      = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir        = {x:1,y:0};
      next       = {x:1,y:0};
      score      = 0;
      started    = false;
      totalSteps = 0;
      hazards    = [];
      scoreEl.textContent = 'Score: 0';
      msgEl.textContent   = '';
      clearInterval(loop);
      loop = null;
      placeFood();
      draw();
    }

    // ── COMIDA ────────────────────────────────────────────
    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
      } while (
        snake.some(s => s.x===pos.x && s.y===pos.y) ||
        hazards.some(h => cellIsInHazard(pos.x, pos.y, h))
      );
      food = pos;
    }

    function ensureFoodSafe() {
      if (hazards.some(h => cellIsInHazard(food.x, food.y, h))) placeFood();
    }

    // ── LÓGICA DE HAZARDS ─────────────────────────────────
    function cellIsInHazard(x, y, h) {
      if (h.x===x && h.y===y) return true;
      if (h.type==='bomb') {
        for (const {dx,dy} of RAY_DIRS) {
          for (let i=1; i<=h.rayLength; i++) {
            const rx=h.x+dx*i, ry=h.y+dy*i;
            if (rx<0||rx>=GRID||ry<0||ry>=GRID) break;
            if (rx===x && ry===y) return true;
          }
        }
      }
      return false;
    }

    function isDeadly(x, y) {
      return hazards.some(h => h.type==='bomb' && cellIsInHazard(x, y, h));
    }

    function freePos() {
      let pos, attempts=0;
      do {
        pos = { x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID) };
        attempts++;
      } while (attempts<300 && (
        snake.some(s=>s.x===pos.x&&s.y===pos.y) ||
        (food && food.x===pos.x && food.y===pos.y) ||
        hazards.some(h=>h.x===pos.x&&h.y===pos.y)
      ));
      return attempts<300 ? pos : null;
    }

    function spawnNumber() {
      const pos = freePos();
      if (!pos) return;
      hazards.push({ type:'number', x:pos.x, y:pos.y, value:5, stepCount:0 });
    }

    function updateHazards() {
      const toConvert=[], toRemove=[];

      hazards.forEach((h,i) => {
        if (h.type==='number') {
          h.stepCount++;
          if (h.stepCount >= STEPS_PER_DECREMENT) {
            h.value--;
            h.stepCount=0;
            if (h.value<=0) toConvert.push(i);
          }
        } else {
          // bomba: el rayo crece 1 cada paso
          h.rayLength++;
          if (h.rayLength > MAX_RAY_LENGTH) toRemove.push(i);
        }
      });

      // Convertir números a bombas (en orden inverso para no desplazar índices)
      [...toConvert].reverse().forEach(i => {
        const h = hazards[i];
        hazards[i] = { type:'bomb', x:h.x, y:h.y, rayLength:0, stepCount:0 };
      });

      // Eliminar bombas expiradas
      [...toRemove].reverse().forEach(i => hazards.splice(i,1));
    }

    // ── BUCLE DE JUEGO ────────────────────────────────────
    function start() {
      started=true;
      msgEl.textContent='';
      loop=setInterval(tick, TICK_MS);
    }

    function gameOver() {
      clearInterval(loop); loop=null; started=false;
      msgEl.textContent=`Game Over — Puntuación: ${score}`;
    }

    function tick() {
      dir=next;
      const head={ x:snake[0].x+dir.x, y:snake[0].y+dir.y };

      // Colisión con pared / consigo misma
      if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        gameOver(); return;
      }

      snake.unshift(head);

      if (bombMode) {
        totalSteps++;

        // Colisión con bomba o rayo
        if (isDeadly(head.x, head.y)) { gameOver(); return; }

        // ¿La serpiente ha recogido un número?
        const ni=hazards.findIndex(h=>h.type==='number'&&h.x===head.x&&h.y===head.y);
        if (ni!==-1) hazards.splice(ni,1);

        // Actualizar cuentas atrás, rayos, conversiones y expiraciones
        updateHazards();

        // ¿Hay que generar un nuevo número?
        if (totalSteps % STEPS_PER_SPAWN===0) spawnNumber();

        // Reubicar comida si ha quedado bajo un hazard
        ensureFoodSafe();
      }

      // ¿Comida comida?
      if (head.x===food.x && head.y===food.y) {
        score++;
        scoreEl.textContent=`Score: ${score}`;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    // ── DIBUJO ────────────────────────────────────────────
    function draw() {
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // Serpiente
      ctx.fillStyle='#00cc44';
      snake.forEach(s=>ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2));

      // Comida
      ctx.fillStyle='#ff4444';
      ctx.fillRect(food.x*CELL+1, food.y*CELL+1, CELL-2, CELL-2);

      // Hazards
      if (bombMode) {
        hazards.forEach(h=> h.type==='number' ? drawNumber(h) : drawBomb(h));
      }
    }

    function drawNumber(h) {
      ctx.fillStyle='#ffdd00';
      ctx.font=`bold ${Math.round(CELL*0.75)}px monospace`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(h.value, h.x*CELL+CELL/2, h.y*CELL+CELL/2);
    }

    function drawBomb(h) {
      // Rayos primero (por debajo de la bomba)
      RAY_DIRS.forEach(({dx,dy})=>{
        for (let i=1; i<=h.rayLength; i++) {
          const rx=h.x+dx*i, ry=h.y+dy*i;
          if (rx<0||rx>=GRID||ry<0||ry>=GRID) break;
          drawRayCell(rx, ry, dx, dy);
        }
      });

      // Bola de la bomba
      const cx=h.x*CELL+CELL/2, cy=h.y*CELL+CELL/2, r=CELL/2-2;
      ctx.fillStyle='#ff6600';
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
      // Mecha
      ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+3,cy-r-4); ctx.stroke();
    }

    function drawRayCell(x, y, dx, dy) {
      ctx.strokeStyle='#ff8800';
      ctx.lineWidth=2;
      ctx.beginPath();

      if (dy===0) {
        // ─  horizontal: de lado a lado de la celda
        const cy=y*CELL+CELL/2;
        ctx.moveTo(x*CELL, cy);
        ctx.lineTo((x+1)*CELL, cy);
      } else if (dx===0) {
        // │  vertical: de arriba abajo de la celda
        const cx=x*CELL+CELL/2;
        ctx.moveTo(cx, y*CELL);
        ctx.lineTo(cx, (y+1)*CELL);
      } else if (dx===dy) {
        // ╲  diagonal: esquina superior izquierda → inferior derecha
        ctx.moveTo(x*CELL, y*CELL);
        ctx.lineTo((x+1)*CELL, (y+1)*CELL);
      } else {
        // ╱  diagonal: esquina inferior izquierda → superior derecha
        ctx.moveTo((x+1)*CELL, y*CELL);
        ctx.lineTo(x*CELL, (y+1)*CELL);
      }
      ctx.stroke();
    }

    // ── CONTROLES ─────────────────────────────────────────
    function handleDir(d) {
      if (!d) return;
      if (d.x===-dir.x && d.y===-dir.y) return;
      next=d;
      if (!started) start();
    }

    btnNormal.addEventListener('click', ()=>{ if(started) return; init(false); start(); });
    btnBombs.addEventListener('click',  ()=>{ if(started) return; init(true);  start(); });

    document.addEventListener('keydown', e=>{
      const map={
        ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
        ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}
      };
      const d=map[e.key]; if(!d) return;
      if (!started&&loop===null) { init(bombMode); setTimeout(()=>handleDir(d),50); }
      else handleDir(d);
    });

    document.addEventListener('touchstart', e=>{
      touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
    },{passive:true});

    document.addEventListener('touchend', e=>{
      const dx=e.changedTouches[0].clientX-touchStartX;
      const dy=e.changedTouches[0].clientY-touchStartY;
      if (Math.abs(dx)<20&&Math.abs(dy)<20) return;
      const d=Math.abs(dx)>Math.abs(dy)
        ? (dx>0?{x:1,y:0}:{x:-1,y:0})
        : (dy>0?{x:0,y:1}:{x:0,y:-1});
      if (!started&&loop===null){init(bombMode);setTimeout(()=>handleDir(d),50);}
      else handleDir(d);
    },{passive:true});

    init(false);
  </script>
</body>
</html>
